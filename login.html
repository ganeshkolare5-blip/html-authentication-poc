<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CampusPe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cp-auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4 py-md-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

                <div class="cp-card p-3 p-sm-4 p-lg-5">

                    <!-- Brand -->
                    <div class="text-center mb-3 mb-md-4">
                        <div class="cp-brand-logo">
                            <i class="bi bi-mortarboard-fill text-white fs-4"></i>
                        </div>
                        <h1 class="h4 fw-bold text-dark mb-1">Welcome back</h1>
                        <p class="text-muted small mb-0">Sign in to your CampusPe account</p>
                    </div>

                    <!-- Form -->
                    <form action="dashboard.html" method="get">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control"
                                       placeholder="you@example.com" required>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center">
                                <label for="password" class="form-label mb-0">Password</label>
                                <a href="forgot-password.html" class="small">Forgot password?</a>
                            </div>
                            <div class="input-group mt-1">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Enter your password" required>
                            </div>
                        </div>

                        <div class="mb-3 mb-md-4 d-flex align-items-center">
                            <input type="checkbox" class="form-check-input me-2" id="remember" name="remember">
                            <label for="remember" class="form-check-label small text-muted">Remember me for 30 days</label>
                        </div>

                        <button type="submit" class="cp-btn-primary w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>

                    </form>

                    <div class="cp-divider my-3 my-md-4">or</div>

                    <p class="text-center text-muted small mb-0">
                        Don't have an account? <a href="register.html">Create one free</a>
                    </p>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
