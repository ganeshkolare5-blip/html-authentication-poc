<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – CampusPe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cp-auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4 py-md-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">

                <div class="cp-card p-3 p-sm-4 p-lg-5">

                    <!-- ── Form State ──────────────────────────────────────── -->
                    <div id="formState">

                        <div class="text-center mb-3 mb-md-4">
                            <div class="cp-icon-badge">
                                <i class="bi bi-key-fill fs-3 text-primary"></i>
                            </div>
                            <h1 class="h4 fw-bold text-dark mb-1">Forgot your password?</h1>
                            <p class="text-muted small mb-0">
                                No worries — enter your email and we'll send you a reset link.
                            </p>
                        </div>

                        <form id="forgotForm" action="reset-password.html" method="get" novalidate>

                            <div class="mb-3 mb-md-4">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group" id="emailGroup">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" name="email" class="form-control"
                                           placeholder="you@example.com" required>
                                </div>
                                <div class="invalid-feedback">
                                    <i class="bi bi-x-circle me-1"></i>Enter a valid email address.
                                </div>
                                <div class="valid-feedback">
                                    <i class="bi bi-check-circle me-1"></i>Email looks good!
                                </div>
                            </div>

                            <button type="submit" class="cp-btn-primary w-100">
                                <i class="bi bi-send me-2"></i>Send Reset Link
                            </button>

                        </form>

                        <div class="text-center mt-3 mt-md-4">
                            <a href="login.html" class="cp-back-link">
                                <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                            </a>
                        </div>

                    </div>

                    <!-- ── Success State ───────────────────────────────────── -->
                    <div id="successState" class="text-center py-2">
                        <div class="cp-success-badge">
                            <i class="bi bi-envelope-check-fill fs-3 text-success"></i>
                        </div>
                        <h2 class="h5 fw-bold text-dark mb-2">Check your inbox</h2>
                        <p class="text-muted small mb-1">We've sent a password reset link to</p>
                        <p class="fw-semibold text-dark small mb-4" id="sentEmailDisplay"></p>
                        <p class="text-muted" style="font-size: 0.78rem;">
                            Didn't receive it? <a href="#" id="resendLink">Resend email</a>
                        </p>
                        <hr class="my-3">
                        <a href="login.html" class="cp-back-link">
                            <i class="bi bi-arrow-left me-1"></i>Back to Sign In
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const emailInput = document.getElementById('email');
        const emailGroup = document.getElementById('emailGroup');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        emailInput.addEventListener('input', function () {
            const valid = emailRegex.test(this.value);
            emailGroup.classList.toggle('is-valid',   valid);
            emailGroup.classList.toggle('is-invalid', !valid && this.value.length > 0);
        });

        document.getElementById('forgotForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            const valid = emailRegex.test(email);
            emailGroup.classList.toggle('is-valid',   valid);
            emailGroup.classList.toggle('is-invalid', !valid);
            if (!valid) return;
            document.getElementById('sentEmailDisplay').textContent = email;
            document.getElementById('formState').style.display    = 'none';
            document.getElementById('successState').style.display = 'block';
        });

        document.getElementById('resendLink').addEventListener('click', function (e) {
            e.preventDefault();
            this.textContent = 'Sent!';
            this.style.pointerEvents = 'none';
            this.style.color = '#198754';
            setTimeout(() => {
                this.textContent = 'Resend email';
                this.style.pointerEvents = '';
                this.style.color = '';
            }, 3000);
        });
    </script>
</body>
</html>
