<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – CampusPe</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="cp-auth-bg d-flex align-items-center justify-content-center min-vh-100 py-4 py-md-5">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-5">

                <div class="cp-card p-3 p-sm-4 p-lg-5">

                    <!-- Brand -->
                    <div class="text-center mb-3 mb-md-4">
                        <div class="cp-brand-logo">
                            <i class="bi bi-mortarboard-fill text-white fs-4"></i>
                        </div>
                        <h1 class="h4 fw-bold text-dark mb-1">Create your account</h1>
                        <p class="text-muted small mb-0">Join CampusPe and get started today</p>
                    </div>

                    <!-- Form -->
                    <form id="registerForm" action="login.html" method="get" novalidate>

                        <!-- Full Name -->
                        <div class="mb-3">
                            <label for="fullname" class="form-label">Full Name</label>
                            <div class="input-group" id="nameGroup">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="fullname" name="fullname" class="form-control"
                                       placeholder="John Doe" required minlength="3">
                            </div>
                            <div class="invalid-feedback"><i class="bi bi-x-circle me-1"></i>Name must be at least 3 characters.</div>
                            <div class="valid-feedback"><i class="bi bi-check-circle me-1"></i>Looks good!</div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group" id="emailGroup">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control"
                                       placeholder="you@example.com" required>
                            </div>
                            <div class="invalid-feedback"><i class="bi bi-x-circle me-1"></i>Enter a valid email address.</div>
                            <div class="valid-feedback"><i class="bi bi-check-circle me-1"></i>Looks good!</div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group" id="passwordGroup">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Min. 8 characters" required minlength="8">
                                <button type="button" class="cp-toggle-btn btn" id="togglePassword" tabindex="-1">
                                    <i class="bi bi-eye" id="togglePasswordIcon"></i>
                                </button>
                            </div>
                            <div class="cp-strength-track" id="strengthBar">
                                <div class="cp-strength-fill" id="strengthFill"></div>
                            </div>
                            <div class="cp-strength-label" id="strengthLabel"></div>
                            <div class="invalid-feedback"><i class="bi bi-x-circle me-1"></i>Password must be at least 8 characters.</div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-3">
                            <label for="confirm_password" class="form-label">Confirm Password</label>
                            <div class="input-group" id="confirmGroup">
                                <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                                       placeholder="Re-enter your password" required>
                                <button type="button" class="cp-toggle-btn btn" id="toggleConfirm" tabindex="-1">
                                    <i class="bi bi-eye" id="toggleConfirmIcon"></i>
                                </button>
                            </div>
                            <div class="invalid-feedback"><i class="bi bi-x-circle me-1"></i>Passwords do not match.</div>
                            <div class="valid-feedback"><i class="bi bi-check-circle me-1"></i>Passwords match!</div>
                        </div>

                        <!-- Terms -->
                        <div class="mb-3 mb-md-4">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="terms" required>
                                <label for="terms" class="cp-terms-text">
                                    I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="cp-btn-primary w-100">
                            <i class="bi bi-person-check me-2"></i>Create Account
                        </button>

                    </form>

                    <div class="cp-divider my-3 my-md-4">or</div>

                    <p class="text-center text-muted small mb-0">
                        Already have an account? <a href="login.html">Sign in</a>
                    </p>

                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleVisibility(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon  = document.getElementById(iconId);
            input.type  = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'text' ? 'bi bi-eye-slash' : 'bi bi-eye';
        }

        document.getElementById('togglePassword').addEventListener('click', () =>
            toggleVisibility('password', 'togglePasswordIcon'));
        document.getElementById('toggleConfirm').addEventListener('click', () =>
            toggleVisibility('confirm_password', 'toggleConfirmIcon'));

        document.getElementById('password').addEventListener('input', function () {
            const val   = this.value;
            const bar   = document.getElementById('strengthBar');
            const fill  = document.getElementById('strengthFill');
            const label = document.getElementById('strengthLabel');

            if (!val) { bar.style.display = label.style.display = 'none'; return; }
            bar.style.display = label.style.display = 'block';

            let score = 0;
            if (val.length >= 8)          score++;
            if (/[A-Z]/.test(val))        score++;
            if (/[0-9]/.test(val))        score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { width: '25%',  color: '#dc3545', text: '🔴 Weak'   },
                { width: '50%',  color: '#fd7e14', text: '🟠 Fair'   },
                { width: '75%',  color: '#ffc107', text: '🟡 Good'   },
                { width: '100%', color: '#198754', text: '🟢 Strong' },
            ];
            const level = levels[score - 1] || levels[0];
            fill.style.width = level.width;
            fill.style.backgroundColor = level.color;
            label.textContent = level.text;
            label.style.color = level.color;
        });

        function setGroupState(id, valid) {
            const g = document.getElementById(id);
            g.classList.toggle('is-valid',   valid);
            g.classList.toggle('is-invalid', !valid);
        }

        document.getElementById('fullname').addEventListener('input', function () {
            setGroupState('nameGroup', this.value.trim().length >= 3);
        });
        document.getElementById('email').addEventListener('input', function () {
            setGroupState('emailGroup', /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value));
        });
        document.getElementById('password').addEventListener('input', function () {
            setGroupState('passwordGroup', this.value.length >= 8);
            const c = document.getElementById('confirm_password');
            if (c.value) setGroupState('confirmGroup', c.value === this.value);
        });
        document.getElementById('confirm_password').addEventListener('input', function () {
            setGroupState('confirmGroup', this.value === document.getElementById('password').value && this.value.length > 0);
        });

        document.getElementById('registerForm').addEventListener('submit', function (e) {
            const name    = document.getElementById('fullname').value.trim();
            const email   = document.getElementById('email').value;
            const pass    = document.getElementById('password').value;
            const confirm = document.getElementById('confirm_password').value;
            const terms   = document.getElementById('terms').checked;

            const nameOk  = name.length >= 3;
            const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            const passOk  = pass.length >= 8;
            const confOk  = pass === confirm;

            setGroupState('nameGroup',     nameOk);
            setGroupState('emailGroup',    emailOk);
            setGroupState('passwordGroup', passOk);
            setGroupState('confirmGroup',  confOk);

            if (!nameOk || !emailOk || !passOk || !confOk || !terms) e.preventDefault();
        });
    </script>
</body>
</html>
